    <script>
    /* Force clear old admin SW caches — v20260523-2 */
    (function(){
        var EXPECTED='tz-admin-shell-20260523-2';
        if(!('caches' in window))return;
        caches.keys().then(function(k){
            k.forEach(function(n){if(n!==EXPECTED&&n.indexOf('tz-admin-shell')===0)caches.delete(n);});
        });
        if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(function(regs){
                regs.forEach(function(r){
                    var u=String(r.active&&r.active.scriptURL||r.installing&&r.installing.scriptURL||'');
                    if(u.indexOf('admin-sw.js')!==-1&&u.indexOf('20260523-2')===-1)r.unregister();
                });
            });
        }
    })();
    </script>
