<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رحلة العميل — النظام التفاعلي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    :root {
      --bg: #030712;
      --bg-surface: rgba(15, 23, 42, 0.4);
      --primary: #00f2fe;
      --primary-glow: rgba(0, 242, 254, 0.3);
      --secondary: #4facfe;
      --accent: #f59e0b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(15, 23, 42, 0.65);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Ambient Background */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      animation: float 20s infinite alternate;
    }
    body::before {
      background: rgba(79, 172, 254, 0.15);
      top: -200px;
      right: -100px;
    }
    body::after {
      background: rgba(0, 242, 254, 0.12);
      bottom: -200px;
      left: -100px;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-50px, 50px) scale(1.1); }
    }

    /* Header */
    .header {
      width: 100%;
      text-align: center;
      padding: 40px 20px 25px;
      position: relative;
      z-index: 10;
    }

    .header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    .header p {
      color: var(--text-muted);
      font-size: 1.15rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Navigation Pill Track */
    .nav-track {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px;
      display: flex;
      gap: 6px;
      margin-bottom: 40px;
      max-width: 95vw;
      overflow-x: auto;
      z-index: 10;
      scrollbar-width: none; /* Firefox */
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .nav-track::-webkit-scrollbar { display: none; }

    .nav-btn {
      padding: 12px 24px;
      border-radius: 100px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .nav-btn:hover { color: var(--text-main); }

    .nav-btn.active {
      background: linear-gradient(135deg, rgba(79, 172, 254, 0.15), rgba(0, 242, 254, 0.15));
      color: var(--primary);
      box-shadow: inset 0 0 0 1px rgba(0, 242, 254, 0.3);
    }

    /* Main Stage */
    .stage-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0 20px 60px;
      z-index: 10;
    }

    .stage {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      max-width: 1000px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stage.wide { max-width: 1400px; }

    .slide-headline {
      width: 100%;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .slide-headline h2 {
      font-size: 1.8rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .slide-headline h2::before {
      content: '';
      display: block;
      width: 6px;
      height: 24px;
      background: var(--primary);
      border-radius: 4px;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* Image Container */
    .image-container {
      position: relative;
      display: inline-block;
      max-width: 100%;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: #000;
    }

    .image-container img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      transition: opacity 0.4s ease;
    }

    /* Pulsing Beacon */
    .beacon {
      position: absolute;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: pointer;
    }

    .beacon-core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--primary);
      z-index: 2;
    }

    .beacon-ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      opacity: 0;
      animation: ripple 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    
    .beacon-ripple-2 { animation-delay: 1s; }

    @keyframes ripple {
      0% { width: 16px; height: 16px; opacity: 1; }
      100% { width: 64px; height: 64px; opacity: 0; }
    }

    /* Explanation Card */
    .info-card {
      position: absolute;
      width: 320px;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 242, 254, 0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: right;
      z-index: 20;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      opacity: 0;
      transform: translateY(15px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }
    
    .info-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .info-card.visible, .beacon:hover + .info-card {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .info-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 12px;
    }
    
    .info-card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(0, 242, 254, 0.1);
      border-radius: 10px;
      color: var(--primary);
      font-size: 1.2rem;
    }

    .info-card h4 {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .info-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* Controls (Next/Prev) */
    .controls {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      width: 100%;
      justify-content: center;
    }

    .control-btn {
      padding: 14px 28px;
      background: rgba(15, 23, 42, 0.6);
      color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    .control-btn:hover:not(:disabled) {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
    }
    
    .control-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .control-btn svg { width: 20px; height: 20px; fill: currentColor; }

    @media (max-width: 768px) {
      .stage { padding: 20px; }
      .header h1 { font-size: 1.8rem; }
      .nav-btn { padding: 10px 16px; font-size: 0.85rem; }
      .info-card { width: 260px; padding: 16px; }
      .slide-headline { flex-direction: column; align-items: flex-start; gap: 15px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>النظام التعليمي — رحلة العميل</h1>
    <p>تابع دليل خطوات استخدام المنصة من التسجيل حتى شحن الرصيد بإشارات تفاعلية أنيقة.</p>
  </header>

  <nav class="nav-track" id="navContainer"></nav>

  <div class="stage-wrapper">
    <main class="stage" id="stage">
      <div class="slide-headline">
        <h2 id="slideTitle">جاري التحميل...</h2>
        <span id="slideCounter" style="color:var(--primary); font-weight:700; font-size:1.1rem; background:rgba(0,242,254,0.1); padding:6px 16px; border-radius:100px;">1 / 7</span>
      </div>
      
      <div class="image-container" id="imageContainer">
        <img id="slideImage" src="" alt="شاشة العرض المرجعية">
      </div>

      <div class="controls">
        <button class="control-btn" id="prevBtn" onclick="prevSlide()">
          <svg viewBox="0 0 24 24"><path d="M9.29 15.88L13.17 12 9.29 8.12a.996.996 0 1 1 1.41-1.41l4.59 4.59c.39.39.39 1.02 0 1.41L10.7 17.3a.996.996 0 0 1-1.41 0c-.38-.39-.39-1.03 0-1.42z"/></svg>
          السابق
        </button>
        <button class="control-btn" id="nextBtn" onclick="nextSlide()">
          التالي
          <svg viewBox="0 0 24 24"><path d="M14.71 15.88L10.83 12l3.88-3.88a.996.996 0 1 0-1.41-1.41L8.71 11.3a.996.996 0 0 0 0 1.41l4.59 4.59c.39.39 1.02.39 1.41 0 .38-.39.39-1.03 0-1.42z"/></svg>
        </button>
      </div>
    </main>
  </div>

  <script>
    const slidesData = [
      {
        title: "الصفحة الرئيسية",
        image: "audit-screenshots/media__1775068153886.png",
        wide: true,
        steps: [
          {
            pointer: { top: "15%", left: "50%" },
            card: { top: "18%", left: "-320px" },
            icon: "🌐",
            title: "الخطوة الأولى",
            description: "قم بالدخول إلى موقعنا الرسمي عبر هذا الرابط: SERVA-S.COM للتصفح والبدء."
          },
          {
            pointer: { top: "25%", left: "15%" },
            card: { top: "30%", left: "-320px" },
            icon: "🚀",
            title: "زر التسجيل",
            description: "اضغط على هذا الزر لإنشاء حساب جديد بالموقع وتفعيل محفظتك الرقمية."
          }
        ]
      },
      {
        title: "تسجيل الدخول",
        image: "audit-screenshots/media__1775068153781.png",
        wide: false,
        steps: [
          {
            pointer: { top: "40%", left: "50%" },
            card: { top: "45%", left: "-320px" },
            icon: "🔐",
            title: "لوحة الدخول",
            description: "إذا كان لديك حساب مسبقاً، أدخل بريدك الإلكتروني وكلمة المرور هنا للاستمرار."
          }
        ]
      },
      {
        title: "إنشاء حساب (الجزء العلوي)",
        image: "audit-screenshots/media__1775068153723.png",
        wide: false,
        steps: [
          {
            pointer: { top: "60%", left: "50%" },
            card: { top: "60%", left: "-320px" },
            icon: "📝",
            title: "البيانات الأساسية",
            description: "أدخل اسمك الكامل، وبريدك الإلكتروني، واختر الدولة ليتم تعبئة مفتاح النداء أوتوماتيكياً."
          }
        ]
      },
      {
        title: "إنشاء حساب (الجزء السفلي)",
        image: "audit-screenshots/media__1775068153417.png",
        wide: false,
        steps: [
          {
            pointer: { top: "40%", left: "50%" },
            card: { top: "40%", left: "-320px" },
            icon: "💲",
            title: "العملة والأمان",
            description: "تحديد عملة العرض (مثال: دولار أو ليرة)، ثم اكتب كلمة مرور قوية واضغط تأكيد لفتح الحساب."
          }
        ]
      },
      {
        title: "لوحة التحكم (Dashboard)",
        image: "audit-screenshots/media__1775092172674.png",
        wide: true,
        steps: [
          {
            pointer: { top: "30%", left: "85%" },
            card: { top: "35%", left: "55%" },
            icon: "💼",
            title: "الرصيد والمحفظة",
            description: "من القائمة الجانبية يمكنك الوصول السريع إلى محفظتك المالية والتحكم بالودائع."
          },
          {
            pointer: { top: "15%", left: "15%" },
            card: { top: "20%", left: "-280px" },
            icon: "⚡",
            title: "إضافة رصيد سريع",
            description: "اضغط على علامة (+) المضيئة للتوجه مباشرة وبسرعة فائقة إلى صفحة شحن الرصيد."
          }
        ]
      },
      {
        title: "شحن النقود (الجزء العلوي)",
        image: "audit-screenshots/media__1775092257797.png",
        wide: false,
        steps: [
          {
            pointer: { top: "45%", left: "50%" },
            card: { top: "45%", left: "-320px" },
            icon: "💰",
            title: "المبلغ المطلوب",
            description: "اكتب المبلغ المالي الذي تريد شحنه يدوياً في هذه الخانة ليقوم النظام بتجهيز الطلب."
          }
        ]
      },
      {
        title: "شحن النقود (الجزء السفلي)",
        image: "audit-screenshots/media__1775093140713.png",
        wide: false,
        steps: [
          {
            pointer: { top: "30%", left: "50%" },
            card: { top: "35%", left: "-320px" },
            icon: "📱",
            title: "عنوان التحويل و QR",
            description: "انسخ هذا العنوان أو قم بمسح الرمز المربع (QR Code) لإرسال أموالك بدقة."
          },
          {
            pointer: { top: "60%", left: "50%" },
            card: { top: "65%", left: "-320px" },
            icon: "📸",
            title: "رفع الإيصال",
            description: "قم بإرفاق صورة توثق عملية التحويل بوضوح ليتم اعتمادها من قبل القسم المالي."
          },
          {
            pointer: { top: "85%", left: "50%" },
            card: { top: "85%", left: "-320px" },
            icon: "📤",
            title: "إرسال طلب الإيداع",
            description: "الخطوة الأخيرة: اضغط هنا وسيقوم النظام بتأكيد الإيصال وإضافة الرصيد لحسابك بأسرع وقت."
          }
        ]
      }
    ];

    let currentConfigIndex = 0;

    function initNav() {
      const navContainer = document.getElementById('navContainer');
      navContainer.innerHTML = '';
      slidesData.forEach((slide, idx) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = (idx + 1) + ". " + slide.title;
        btn.onclick = () => render(idx);
        navContainer.appendChild(btn);
      });
    }

    function render(index) {
      currentConfigIndex = index;
      const slide = slidesData[index];
      const imgEl = document.getElementById('slideImage');
      
      // Quick fade animation
      imgEl.style.opacity = '0';
      
      setTimeout(() => {
        document.getElementById('slideTitle').textContent = slide.title;
        document.getElementById('slideCounter').textContent = (index + 1) + ' / ' + slidesData.length;
        imgEl.src = slide.image;
        imgEl.style.opacity = '1';
        
        const stage = document.getElementById('stage');
        slide.wide ? stage.classList.add('wide') : stage.classList.remove('wide');

        // Update Nav
        document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
          btn.classList.toggle('active', idx === index);
          if(idx === index) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });

        // Controls State
        document.getElementById('prevBtn').disabled = (index === 0);
        document.getElementById('nextBtn').disabled = (index === slidesData.length - 1);

        drawPointers(slide.steps);
      }, 150); // slight delay for smooth image swap
    }

    function drawPointers(steps) {
      const container = document.getElementById('imageContainer');
      container.querySelectorAll('.beacon, .info-card').forEach(el => el.remove());

      steps.forEach((step, stepIdx) => {
        // Beacon Wrapper
        const beacon = document.createElement('div');
        beacon.className = 'beacon';
        beacon.style.top = step.pointer.top;
        beacon.style.left = step.pointer.left;
        
        beacon.innerHTML = `
          <div class="beacon-ripple"></div>
          <div class="beacon-ripple beacon-ripple-2"></div>
          <div class="beacon-core"></div>
        `;
        
        // Info Card
        const card = document.createElement('div');
        // Let's make cards show automatically with a tiny delay based on index for a cascading effect
        setTimeout(() => { card.classList.add('visible'); }, 300 + (stepIdx * 150));
        
        card.className = 'info-card';
        card.style.top = step.card.top || step.pointer.top;
        card.style.left = step.card.left || `calc(${step.pointer.left} + 40px)`;
        
        const icon = step.icon || 'ℹ️';
        card.innerHTML = `
          <div class="info-card-header">
            <div class="info-card-icon">${icon}</div>
            <h4>${step.title}</h4>
          </div>
          <p>${step.description}</p>
        `;

        // Event listeners to raise z-index on hover
        beacon.onmouseenter = () => { card.style.zIndex = '30'; card.classList.add('visible'); };
        beacon.onmouseleave = () => { card.style.zIndex = '20'; };

        container.appendChild(beacon);
        container.appendChild(card);
      });
    }

    function nextSlide() {
      if (currentConfigIndex < slidesData.length - 1) render(currentConfigIndex + 1);
    }

    function prevSlide() {
      if (currentConfigIndex > 0) render(currentConfigIndex - 1);
    }

    window.onload = () => {
      initNav();
      render(0);
    };
  </script>
</body>
</html>
